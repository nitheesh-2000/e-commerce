{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<div class="account-page">
   
    <div class="container">
        <div class="row">
            <div class="col-2">
                <img src="{% static 'images/image1.png' %}" width="100%">
            </div>
            <div class="col-2">
              
                {% if messages %}
                <div class="message-container">
                    {% for message in messages %}
                        <li class="{{ message.tags }}">{{ message }}</li>
                    
                        
                    {% endfor %}
                </div>
                {% endif %}
                <div class="form-container">
                    <div class="form-btn">
                        <span onclick="login()">Login</span>
                        <span onclick="register()">Register</span>
                        <hr id="Indicator">
                    </div>
                    <form id="LoginForm" method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <input type="text" required name="username" placeholder="Username">
                        <input type="password" required name="password"  placeholder="Password">
                        <button  type="submit" name="login" class="btn">Login</button>
                        <a href="">Forget Password</a>
                    </form>

                    <form id="RegForm" method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <input type="text" name="username" maxlength="10" minlength="5" required placeholder="Username">
                        <input type="emaiil" name="email" required placeholder="Email">
                        <input type="password" required minlength="6" name="password" placeholder="Password">
                        <input type="text" minlength="5" name="address" placeholder="Address">
                        <input type="text" maxlength="10" name="phone" placeholder="Phone">
                        <button type="submit" name="register" class="btn">Register</button>
                    </form>
                    <script>
                        var LoginForm = document.getElementById("LoginForm");
                        var RegForm = document.getElementById("RegForm");
                        var Indicator = document.getElementById("Indicator");
                        function register() {
                            RegForm.style.transform = "translatex(0px)";
                            LoginForm.style.transform = "translatex(0px)";
                            Indicator.style.transform = "translateX(100px)";
                
                        }
                        function login() {
                            RegForm.style.transform = "translatex(300px)";
                            LoginForm.style.transform = "translatex(300px)";
                            Indicator.style.transform = "translate(0px)";
                
                        }
                    </script>
                </div>
            </div>
        </div>
    </div>
</div>
